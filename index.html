<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flow Tree</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <link rel="manifest" href="menifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
            .then(() => console.log('Service Worker Registered'))
            .catch(error => console.error('Service Worker Registration failed:', error));
        }
    </script>
</head>
<body>
    <h1>Flow Tree</h1>
    <div id="subtitle">连接彩色节点，填满棋盘</div>

    <div id="game-container">
        <canvas id="game-canvas"></canvas>
    </div>

    <div id="controls">
        <div class="difficulty-row">
            <span id="difficulty-label-text">难度：</span>
            <input type="range" id="difficulty-slider" class="slider" min="1" max="5" value="1">
            <span id="difficulty-label">超易</span>
        </div>

        <div id="buttons-row">
            <button id="start-button">&#9654; 开始</button>
            <button id="rules-button">&#63; 规则</button>
        </div>
    </div>

    <div id="stats-row">
        <div class="stat-box">
            <div class="stat-label">步数</div>
            <div class="stat-value" id="move-counter">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">连通数</div>
            <div class="stat-value" id="pipe-counter">0</div>
        </div>
    </div>

    <div id="message"></div>

    <div id="rules-modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>游戏规则</h2>
            <p>连接所有同色节点，让线条填满整个棋盘！</p>
            <ul>
                <li>点击并拖动来连接同色节点</li>
                <li>路径只能水平或垂直延伸</li>
                <li>所有格子必须被填满</li>
                <li>路径不能交叉</li>
                <li>连接匹配颜色才算完成一条线</li>
            </ul>
        </div>
    </div>
</body>
</html>
